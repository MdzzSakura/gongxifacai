# 市场情绪阈值
emotion:
  hot_up_count: 4500        # 上涨家数≥此值视为日内情绪高点(谨慎)
  cold_up_count: 800        # 上涨家数≤此值视为接近冰点(关注机会)
  # 量能:今日两市总成交额 / 前5个有数据交易日均额(由 daily 表离线重建)
  volume_up_ratio: 1.15     # 今日成交额/近5日均额 ≥ 此值=放量
  volume_down_ratio: 0.85   # ≤ 此值=缩量

# 板块榜
sector:
  top_n: 10                 # 取涨幅前 N 个板块
  core_drill_top_n: 3       # 下钻前3个强势板块的成分股
  core_top_n: 5             # 每个板块取核心成分股数

# 净利润断层
profit_fault:
  growth_threshold: 50.0    # 预告/快报净利润同比增速≥此值(proxy超预期,单位%)

# 全市场底部爆量大涨(地量地价后突放巨量+大涨的启动信号)
bottom_volume:
  rise_threshold: 7.0           # 大涨:今日涨幅≥此值(%)
  volume_ratio_threshold: 2.0   # 爆量:量比(今量/前N日均量)≥此值
  bottom_ratio: 0.6             # 底部:今收≤最近window日最高×此系数
  bottom_window: 60             # 底部窗口(交易日)
  volume_baseline: 5            # 量比基准(前N日均量)
  max_survivors: 60             # 粗筛后按涨幅取前N只精算(上限,控制耗时)
  top_n: 50                     # 面板展示条数

# 信号前向收益追踪
tracking:
  horizons: [1, 3, 5, 10]   # 评估持有期(信号日之后第 N 个交易日,收盘对收盘)
